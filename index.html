<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>APK AI Studio — 本地 AI 驱动的 APK 工坊</title>
<style>
/* ========== RESET & BASE ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0e;
  --surface-1:#141416;
  --surface-2:#1a1a1d;
  --surface-3:#222228;
  --border:color-mix(in srgb,#333 70%,#1a1a1d);
  --text-primary:#e1e1e6;
  --text-secondary:#88889a;
  --text-muted:#5c5c6e;
  --accent:#f0a040;
  --accent-glow:color-mix(in srgb,var(--accent) 40%,transparent);
  --danger:#e84a4a;
  --success:#3db87f;
  --info:#5b9bd5;
  --radius-sm:6px;
  --radius:10px;
  --radius-lg:16px;
  --font-mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  --font-sans:'Plus Jakarta Sans','Inter Display',system-ui,sans-serif;
  --ease-out: cubic-bezier(0.16,1,0.3,1);
  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:var(--font-sans);
  background:var(--bg);
  color:var(--text-primary);
  min-height:100dvh;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}
::selection{background:var(--accent);color:var(--bg)}

/* ========== LAYOUT ========== */
.app{display:flex;flex-direction:column;min-height:100dvh}
header{
  padding:clamp(14px,3vw,22px) clamp(16px,4vw,32px);
  border-bottom:1px solid var(--border);
  background:var(--surface-1);
  backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:14px;
}
.logo{
  width:36px;height:36px;
  border-radius:var(--radius-sm);
  background:var(--accent);
  display:grid;place-items:center;
  font-family:var(--font-mono);
  font-weight:800;font-size:1rem;
  color:var(--bg);
  flex-shrink:0;
}
.header-text{flex:1}
.header-text h1{font-size:clamp(1rem,2.5vw,1.2rem);font-weight:700;letter-spacing:-0.01em;line-height:1.2}
.header-text span{font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em}
.status-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--text-muted);
  flex-shrink:0;
  transition:background .3s var(--ease-out);
}
.status-dot.ready{background:var(--success);box-shadow:0 0 8px color-mix(in srgb,var(--success) 50%,transparent)}
.status-dot.busy{background:var(--accent);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

main{
  flex:1;
  display:grid;
  grid-template-columns:1fr;
  gap:clamp(12px,2vw,20px);
  padding:clamp(12px,3vw,20px);
  max-width:1400px;margin:0 auto;width:100%;
}
@media(min-width:900px){
  main{grid-template-columns:1fr 1fr}
  .panel-full{grid-column:1/-1}
}
@media(min-width:1200px){
  main{grid-template-columns:360px 1fr 1fr}
  .panel-full{grid-column:1/-1}
}

/* ========== PANELS ========== */
.panel{
  background:var(--surface-1);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  overflow:hidden;
  display:flex;flex-direction:column;
  transition:border-color .25s var(--ease-out);
}
.panel:focus-within{border-color:color-mix(in srgb,var(--accent) 40%,var(--border))}
.panel-header{
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  font-size:0.8rem;font-weight:600;letter-spacing:0.02em;
  color:var(--text-secondary);text-transform:uppercase;
  background:var(--surface-2);
}
.panel-header .icon{font-size:1rem;opacity:0.7}
.panel-body{
  flex:1;padding:16px;
  overflow-y:auto;
  display:flex;flex-direction:column;gap:12px;
  max-height:clamp(300px,50vh,600px);
}

/* ========== FORM ELEMENTS ========== */
input,textarea,select,button{
  font-family:inherit;font-size:0.85rem;
  border-radius:var(--radius-sm);
  transition:all .2s var(--ease-out);
}
input[type="text"],input[type="url"],input[type="password"],textarea,select{
  width:100%;
  padding:10px 14px;
  background:var(--surface-3);
  border:1px solid var(--border);
  color:var(--text-primary);
  resize:vertical;
}
input:focus,textarea:focus,select:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
textarea{min-height:80px;font-family:var(--font-mono);font-size:0.8rem}
label{
  font-size:0.72rem;font-weight:600;text-transform:uppercase;
  letter-spacing:0.05em;color:var(--text-muted);
  display:block;margin-bottom:4px;
}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 18px;
  font-weight:600;font-size:0.8rem;
  letter-spacing:0.02em;
  border:none;cursor:pointer;
  border-radius:var(--radius-sm);
  transition:all .2s var(--ease-out);
  white-space:nowrap;
  user-select:none;
  -webkit-user-select:none;
}
.btn:active{transform:scale(0.97)}
.btn-primary{
  background:var(--accent);color:var(--bg);
  box-shadow:0 2px 12px var(--accent-glow);
}
.btn-primary:hover{filter:brightness(1.1)}
.btn-ghost{
  background:transparent;color:var(--text-secondary);
  border:1px solid var(--border);
}
.btn-ghost:hover{background:var(--surface-3);color:var(--text-primary)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{filter:brightness(1.15)}
.btn-sm{padding:6px 12px;font-size:0.72rem}
.btn:disabled{opacity:0.4;cursor:not-allowed;pointer-events:none}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* ========== FILE DROP ZONE ========== */
.drop-zone{
  border:2px dashed var(--border);
  border-radius:var(--radius);
  padding:clamp(24px,6vw,40px);
  text-align:center;
  cursor:pointer;
  transition:all .25s var(--ease-out);
  background:var(--surface-2);
}
.drop-zone.drag-over{
  border-color:var(--accent);
  background:color-mix(in srgb,var(--accent) 8%,var(--surface-2));
  box-shadow:inset 0 0 40px var(--accent-glow);
}
.drop-zone .dz-icon{font-size:2.5rem;margin-bottom:8px;opacity:0.6}
.drop-zone .dz-text{font-size:0.85rem;color:var(--text-secondary)}
.drop-zone .dz-hint{font-size:0.7rem;color:var(--text-muted);margin-top:4px}
.drop-zone input[type="file"]{display:none}

/* ========== PROGRESS ========== */
.progress-bar{
  height:4px;background:var(--surface-3);border-radius:2px;overflow:hidden;
}
.progress-bar .fill{
  height:100%;
  background:var(--accent);
  border-radius:2px;
  width:0%;
  transition:width .3s var(--ease-out);
}
.progress-label{
  font-size:0.7rem;color:var(--text-muted);
  display:flex;justify-content:space-between;
}

/* ========== FILE TREE ========== */
.file-tree{
  font-family:var(--font-mono);font-size:0.75rem;line-height:1.8;
  list-style:none;
}
.file-tree li{padding:2px 6px;border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:6px}
.file-tree li:hover{background:var(--surface-3)}
.file-tree li.selected{background:var(--accent-glow);color:var(--accent)}
.file-tree .ft-icon{font-size:0.85rem;width:18px;text-align:center;flex-shrink:0}
.file-tree .ft-dir{color:var(--info)}
.file-tree .ft-file{color:var(--text-secondary)}
.file-tree .ft-size{font-size:0.65rem;color:var(--text-muted);margin-left:auto}

/* ========== CHAT ========== */
.chat-log{
  flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;
  padding-right:4px;
}
.chat-msg{
  max-width:90%;padding:10px 14px;border-radius:var(--radius);
  font-size:0.82rem;line-height:1.5;
  animation:fadeUp .3s var(--ease-out);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.user{
  align-self:flex-end;
  background:var(--accent);color:var(--bg);
  border-bottom-right-radius:4px;
}
.chat-msg.assistant{
  align-self:flex-start;
  background:var(--surface-2);
  border-bottom-left-radius:4px;
  border:1px solid var(--border);
}
.chat-msg.system{
  align-self:center;
  background:transparent;color:var(--text-muted);
  font-size:0.7rem;text-align:center;max-width:100%;
}
.chat-input-row{display:flex;gap:8px;margin-top:8px}
.chat-input-row input{flex:1}

/* ========== GITHUB SECTION ========== */
.gh-result{
  font-size:0.78rem;padding:10px 14px;border-radius:var(--radius-sm);
  background:var(--surface-2);border:1px solid var(--border);
}
.gh-result.success{border-color:var(--success)}
.gh-result.error{border-color:var(--danger);color:var(--danger)}

/* ========== TOAST ========== */
.toast-container{
  position:fixed;bottom:20px;right:20px;
  z-index:999;display:flex;flex-direction:column;gap:8px;
  pointer-events:none;
}
.toast{
  background:var(--surface-2);border:1px solid var(--border);
  padding:12px 18px;border-radius:var(--radius);
  font-size:0.8rem;box-shadow:0 8px 32px rgba(0,0,0,.4);
  animation:slideIn .35s var(--ease-spring);
  pointer-events:auto;
  max-width:320px;
}
.toast.success{border-color:var(--success)}
.toast.error{border-color:var(--danger)}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* ========== RESPONSIVE ========== */
@media(max-width:600px){
  .panel-body{padding:10px;gap:8px}
  .chat-msg{max-width:95%}
  .btn{font-size:0.75rem;padding:8px 14px}
}
</style>
</head>

<!-- COI ServiceWorker 内嵌，解决 SharedArrayBuffer 跨域隔离问题 -->
<script>
(function(){
  if(typeof window==='undefined'||typeof document==='undefined')return;
  if(window.crossOriginIsolated)return;
  const swCode=`
self.addEventListener('install',()=>self.skipWaiting());
self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));
self.addEventListener('fetch',e=>{
  if(!e.request.url.startsWith(self.location.origin))return;
  e.respondWith((async()=>{
    const r=await fetch(e.request);
    const h=new Headers(r.headers);
    h.set('Cross-Origin-Embedder-Policy','require-corp');
    h.set('Cross-Origin-Opener-Policy','same-origin');
    return new Response(r.body,{status:r.status,statusText:r.statusText,headers:h});
  })());
});
`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const blobUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(blobUrl,{scope:'/'}).then(()=>{
    if(!window.crossOriginIsolated){
      setTimeout(()=>location.reload(),200);
    }
  }).catch(()=>{});
})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script type="module">
// ==================== WLLAMA 动态加载 ====================
let Wllama=null;
let wllamaInstance=null;
let modelLoaded=false;
let modelLoading=false;

async function ensureWllama(){
  if(Wllama)return Wllama;
  try{
    const mod=await import('https://esm.sh/@wllama/wllama@2.0.3');
    Wllama=mod.Wllama;
    return Wllama;
  }catch(e){
    console.error('wllama 加载失败:',e);
    return null;
  }
}

// ==================== 状态管理 ====================
const state={
  apkZip:null,           // JSZip 实例
  apkFiles:[],           // APK 内文件列表 [{name,dir,size,data}]
  apkModified:{},        // 被修改的文件 {filename: newData(Uint8Array)}
  apkDeleted:new Set(),  // 被删除的文件
  selectedFile:null,     // 当前选中的文件
  modifiedApkBlob:null,  // 修改后重新打包的 APK blob
  chatHistory:[],        // AI 对话历史
  useLocalAPI:false,     // 是否使用本地 API 模式
  apiBaseUrl:'http://localhost:8080/v1',
};

// ==================== DOM 引用 ====================
const $=id=>document.getElementById(id);
const dom={
  statusDot:$('statusDot'),
  dropModel:$('dropModel'),modelFileInput:$('modelFileInput'),
  modelProgress:$('modelProgress'),modelProgressFill:$('modelProgressFill'),
  modelProgressLabel:$('modelProgressLabel'),modelProgressPct:$('modelProgressPct'),
  dropApk:$('dropApk'),apkFileInput:$('apkFileInput'),
  apkDropText:$('apkDropText'),apkDropHint:$('apkDropHint'),apkInfo:$('apkInfo'),
  chatLog:$('chatLog'),chatInput:$('chatInput'),chatSend:$('chatSend'),chatBody:$('chatBody'),
  fileTreeBody:$('fileTreeBody'),
  panelEditor:$('panelEditor'),editorFileName:$('editorFileName'),
  editorFileSize:$('editorFileSize'),fileEditor:$('fileEditor'),
  ghRepo:$('ghRepo'),ghBranch:$('ghBranch'),ghToken:$('ghToken'),
  ghPath:$('ghPath'),ghResult:$('ghResult'),
  btnUploadGitHub:$('btnUploadGitHub'),btnDownloadApk:$('btnDownloadApk'),
  apiBaseUrl:$('apiBaseUrl'),
  toastContainer:$('toastContainer'),
};

// ==================== TOAST ====================
function toast(msg,type=''){
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.textContent=msg;
  dom.toastContainer.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)},3000);
}

// ==================== 模型加载 ====================
async function loadGGUFModel(file){
  if(modelLoading||modelLoaded){toast('模型已加载或正在加载中');return;}
  modelLoading=true;
  dom.statusDot.className='status-dot busy';
  dom.modelProgress.style.display='block';
  dom.modelProgressLabel.textContent='正在加载模型...';
  dom.modelProgressPct.textContent='0%';
  dom.modelProgressFill.style.width='0%';

  const W=await ensureWllama();
  if(!W){toast('无法加载 wllama，请检查网络','error');modelLoading=false;dom.statusDot.className='status-dot';return;}

  try{
    const config={
      'n_threads': navigator.hardwareConcurrency||4,
      onModelLoaded:()=>{
        dom.modelProgressLabel.textContent='模型已加载';
        dom.modelProgressPct.textContent='100%';
        dom.modelProgressFill.style.width='100%';
      },
      onInference:(progress)=>{
        dom.modelProgressLabel.textContent='推理中...';
        dom.modelProgressPct.textContent=Math.round(progress*100)+'%';
        dom.modelProgressFill.style.width=(progress*100)+'%';
      },
    };
    wllamaInstance=new W(config);
    const objectUrl=URL.createObjectURL(file);
    await wllamaInstance.loadModelFromUrl(objectUrl);
    URL.revokeObjectURL(objectUrl);

    modelLoaded=true;
    modelLoading=false;
    dom.statusDot.className='status-dot ready';
    dom.chatInput.disabled=false;
    dom.chatSend.disabled=false;
    dom.modelProgress.style.display='none';
    updateDropZoneText();
    toast('模型加载成功，可以开始对话','success');
  }catch(e){
    console.error(e);
    modelLoading=false;
    dom.statusDot.className='status-dot';
    dom.modelProgress.style.display='none';
    toast('模型加载失败: '+e.message,'error');
  }
}

// ==================== APK 处理 ====================
async function loadAPK(file){
  try{
    const buf=await file.arrayBuffer();
    const zip=await JSZip.loadAsync(buf);
    state.apkZip=zip;
    state.apkFiles=[];
    state.apkModified={};
    state.apkDeleted=new Set();
    state.selectedFile=null;
    state.modifiedApkBlob=null;

    const promises=[];
    zip.forEach((relativePath,f)=>{
      const isDir=f.dir;
      promises.push((async()=>{
        let data=null;
        let size=f._data?.uncompressedSize||0;
        if(!isDir){
          data=await f.async('uint8array');
          size=data.length;
        }
        state.apkFiles.push({
          name:relativePath,
          dir:isDir,
          size:size,
          data:data,
        });
      })());
    });
    await Promise.all(promises);
    state.apkFiles.sort((a,b)=>{
      if(a.dir!==b.dir)return a.dir?-1:1;
      return a.name.localeCompare(b.name);
    });

    dom.apkDropText.textContent=file.name;
    dom.apkDropHint.textContent=`${(file.size/1024/1024).toFixed(1)} MB · ${state.apkFiles.length} 个文件`;
    dom.apkInfo.textContent=`已加载: ${file.name} | ${state.apkFiles.filter(f=>!f.dir).length} 文件, ${state.apkFiles.filter(f=>f.dir).length} 目录`;
    dom.btnUploadGitHub.disabled=true;
    dom.btnDownloadApk.disabled=true;
    state.modifiedApkBlob=null;

    renderFileTree();
    toast('APK 加载成功','success');
  }catch(e){
    toast('APK 加载失败: '+e.message,'error');
  }
}

function renderFileTree(){
  const files=state.apkFiles;
  let html='<ul class="file-tree">';
  for(const f of files){
    const indent=f.name.split('/').length-1;
    const displayName=f.name.split('/').pop()||f.name;
    const isSelected=state.selectedFile&&state.selectedFile.name===f.name;
    const cls=f.dir?'ft-dir':'ft-file';
    const icon=f.dir?'📁':'📄';
    const sizeStr=f.dir?'':formatSize(f.size);
    const modified=state.apkModified[f.name]?' ✏️':'';
    const deleted=state.apkDeleted.has(f.name)?' 🗑':'';
    html+=`<li class="${isSelected?'selected':''}" style="padding-left:${10+indent*16}px" onclick="selectFile('${escapeHtml(f.name)}')">
      <span class="ft-icon ${cls}">${icon}</span>
      <span>${displayName}${modified}${deleted}</span>
      ${sizeStr?`<span class="ft-size">${sizeStr}</span>`:''}
    </li>`;
  }
  html+='</ul>';
  dom.fileTreeBody.innerHTML=html;
}

function formatSize(bytes){
  if(bytes<1024)return bytes+' B';
  if(bytes<1024*1024)return (bytes/1024).toFixed(1)+' KB';
  return (bytes/1024/1024).toFixed(1)+' MB';
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}

// ==================== 文件选择 & 编辑 ====================
window.selectFile=function(name){
  const f=state.apkFiles.find(x=>x.name===name);
  if(!f||f.dir)return;
  state.selectedFile=f;
  dom.panelEditor.style.display='flex';
  dom.editorFileName.textContent=f.name;
  dom.editorFileSize.textContent=formatSize(f.size);

  const modifiedData=state.apkModified[f.name];
  const rawData=modifiedData||f.data;
  if(!rawData){dom.fileEditor.value='[无法读取此文件]';renderFileTree();return;}

  // 判断是否为文本文件
  const ext=f.name.split('.').pop()?.toLowerCase();
  const textExts=new Set(['xml','txt','json','yml','yaml','properties','mf','sf','pro','smali','java','kt','gradle','cfg','ini','conf','csv','md','html','css','js','ts']);
  if(textExts.has(ext)||f.name==='AndroidManifest.xml'||f.name.includes('META-INF')||f.name.includes('res/')){
    const decoder=new TextDecoder('utf-8');
    try{
      let text=decoder.decode(rawData);
      dom.fileEditor.value=text;
      dom.fileEditor.style.display='block';
    }catch(e){
      dom.fileEditor.value='[二进制文件，无法直接编辑]';
      dom.fileEditor.style.display='block';
    }
  }else if(ext==='png'||ext==='jpg'||ext==='jpeg'||ext==='gif'||ext==='webp'){
    dom.fileEditor.value='[图片文件，当前版本不支持图片预览编辑]';
    dom.fileEditor.style.display='block';
  }else{
    dom.fileEditor.value='[二进制文件，不支持直接编辑]';
    dom.fileEditor.style.display='block';
  }
  renderFileTree();
};

window.saveEditedFile=function(){
  if(!state.selectedFile)return;
  const newText=dom.fileEditor.value;
  const encoder=new TextEncoder();
  const newData=encoder.encode(newText);
  state.apkModified[state.selectedFile.name]=newData;
  state.apkDeleted.delete(state.selectedFile.name);
  toast(`已保存修改: ${state.selectedFile.name}`,'success');
  rebuildApk();
  renderFileTree();
};

window.closeEditor=function(){
  dom.panelEditor.style.display='none';
  state.selectedFile=null;
  renderFileTree();
};

async function rebuildApk(){
  if(!state.apkZip){return;}
  const newZip=new JSZip();

  for(const f of state.apkFiles){
    if(state.apkDeleted.has(f.name))continue;
    if(state.apkModified[f.name]){
      newZip.file(f.name,state.apkModified[f.name]);
    }else if(!f.dir&&f.data){
      newZip.file(f.name,f.data);
    }else if(f.dir){
      newZip.folder(f.name);
    }
  }

  const blob=await newZip.generateAsync({type:'blob',compression:'DEFLATE'});
  state.modifiedApkBlob=blob;
  dom.btnDownloadApk.disabled=false;
  dom.btnUploadGitHub.disabled=false;
}

// ==================== 下载修改后的 APK ====================
window.downloadModifiedApk=function(){
  if(!state.modifiedApkBlob){toast('请先修改 APK','error');return;}
  const url=URL.createObjectURL(state.modifiedApkBlob);
  const a=document.createElement('a');
  a.href=url;
  a.download='modified.apk';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('下载已开始（未签名 APK，需自行签名）','success');
};

// ==================== AI 对话 ====================
window.sendChat=async function(){
  const input=dom.chatInput.value.trim();
  if(!input)return;
  dom.chatInput.value='';
  dom.chatInput.disabled=true;
  dom.chatSend.disabled=true;

  addChatMsg(input,'user');

  let apkContext='';
  if(state.apkZip){
    const fileList=state.apkFiles.filter(f=>!f.dir).slice(0,40).map(f=>f.name).join(', ');
    apkContext=`\n当前已加载 APK，包含以下文件（前40个）: ${fileList}`;
    if(state.selectedFile){
      apkContext+=`\n当前正在查看文件: ${state.selectedFile.name}`;
    }
  }

  try{
    let reply;
    if(state.useLocalAPI){
      reply=await chatLocalAPI(input,apkContext);
    }else if(wllamaInstance){
      reply=await chatWllama(input,apkContext);
    }else{
      reply='请先加载 GGUF 模型或连接本地 API。';
    }
    addChatMsg(reply,'assistant');
  }catch(e){
    addChatMsg('错误: '+e.message,'assistant');
  }
  dom.chatInput.disabled=false;
  dom.chatSend.disabled=false;
  dom.chatInput.focus();
};

async function chatWllama(prompt,context){
  const fullPrompt=`你是一个 APK 修改专家助手。${context}\n\n用户: ${prompt}\n\n助手:`;
  const result=await wllamaInstance.createCompletion(fullPrompt,{
    nPredict:512,
    temperature:0.7,
    topK:40,
    topP:0.9,
    stopStrings:['用户:','<|user|>','<|end|>'],
  });
  return result.trim();
}

async function chatLocalAPI(prompt,context){
  const messages=[
    {role:'system',content:`你是 APK 修改专家助手。${context}`},
    {role:'user',content:prompt},
  ];
  const resp=await fetch(`${state.apiBaseUrl}/chat/completions`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'local-model',messages,temperature:0.7,max_tokens:512}),
  });
  if(!resp.ok)throw new Error(`API 错误 ${resp.status}`);
  const data=await resp.json();
  return data.choices?.[0]?.message?.content||'[无回复]';
}

function addChatMsg(text,role){
  const div=document.createElement('div');
  div.className=`chat-msg ${role}`;
  div.textContent=text;
  dom.chatLog.appendChild(div);
  dom.chatBody.scrollTop=dom.chatBody.scrollHeight;
  state.chatHistory.push({role,content:text});
}

// ==================== GitHub 上传 ====================
window.uploadToGitHub=async function(){
  const repo=dom.ghRepo.value.trim();
  const token=dom.ghToken.value.trim();
  const path=dom.ghPath.value.trim();
  const branch=dom.ghBranch.value.trim()||'main';

  if(!repo||!token||!path){toast('请填写仓库、Token 和目标路径','error');return;}
  if(!state.modifiedApkBlob){toast('请先修改 APK','error');return;}

  dom.btnUploadGitHub.disabled=true;
  dom.btnUploadGitHub.textContent='上传中...';
  dom.ghResult.innerHTML='';

  try{
    const buf=await state.modifiedApkBlob.arrayBuffer();
    const base64=btoa(String.fromCharCode(...new Uint8Array(buf)));

    // 先尝试获取文件 SHA（如果文件已存在需要提供）
    let sha=null;
    try{
      const getResp=await fetch(`https://api.github.com/repos/${repo}/contents/${path}?ref=${branch}`,{
        headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json'},
      });
      if(getResp.ok){
        const getData=await getResp.json();
        sha=getData.sha;
      }
    }catch(e){/* 文件不存在，继续 */}

    const body={message:`Update ${path}`,content:base64,branch:branch};
    if(sha)body.sha=sha;

    const resp=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      method:'PUT',
      headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify(body),
    });

    const data=await resp.json();
    if(resp.ok){
      dom.ghResult.innerHTML=`<div class="gh-result success">上传成功！<br><a href="${data.content?.html_url||`https://github.com/${repo}/blob/${branch}/${path}`}" target="_blank" style="color:var(--accent)">查看文件 →</a></div>`;
      toast('上传成功！','success');
    }else{
      dom.ghResult.innerHTML=`<div class="gh-result error">上传失败: ${data.message||resp.status}</div>`;
      toast('上传失败: '+(data.message||resp.status),'error');
    }
  }catch(e){
    dom.ghResult.innerHTML=`<div class="gh-result error">网络错误: ${e.message}</div>`;
    toast('网络错误','error');
  }
  dom.btnUploadGitHub.disabled=false;
  dom.btnUploadGitHub.textContent='⬆ 上传修改后的 APK 到 GitHub';
};

// ==================== 事件绑定 ====================
function setupDropZone(el,fileInput,onFile){
  el.addEventListener('click',()=>fileInput.click());
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over')});
  el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
  el.addEventListener('drop',e=>{
    e.preventDefault();
    el.classList.remove('drag-over');
    const file=e.dataTransfer.files[0];
    if(file)onFile(file);
  });
  fileInput.addEventListener('change',e=>{
    const file=e.target.files[0];
    if(file)onFile(file);
    fileInput.value='';
  });
}

setupDropZone(dom.dropModel,dom.modelFileInput,file=>{
  if(!file.name.endsWith('.gguf')){toast('请选择 .gguf 模型文件','error');return;}
  loadGGUFModel(file);
});

setupDropZone(dom.dropApk,dom.apkFileInput,file=>{
  const ext=file.name.split('.').pop()?.toLowerCase();
  if(!['apk','xapk','apks','zip'].includes(ext)){toast('请选择 .apk / .xapk / .apks 文件','error');return;}
  loadAPK(file);
});

// 回车发送
dom.chatInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    if(!dom.chatSend.disabled)sendChat();
  }
});

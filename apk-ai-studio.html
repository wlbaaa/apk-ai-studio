<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>APK AI Studio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0e;--s1:#141416;--s2:#1a1a1d;--s3:#222228;
  --br:color-mix(in srgb,#333 70%,#1a1a1d);
  --t1:#e1e1e6;--t2:#88889a;--t3:#5c5c6e;
  --ac:#f0a040;--ag:color-mix(in srgb,var(--ac) 40%,transparent);
  --er:#e84a4a;--ok:#3db87f;
  --r:10px;--rs:6px;
}
html{font-size:16px}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--t1);
  min-height:100dvh;line-height:1.5;
  -webkit-tap-highlight-color:transparent;
}
::selection{background:var(--ac);color:var(--bg)}

header{
  padding:14px 16px;border-bottom:1px solid var(--br);
  background:var(--s1);position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:12px;
}
.logo{
  width:34px;height:34px;border-radius:var(--rs);
  background:var(--ac);display:grid;place-items:center;
  font-weight:800;font-size:0.9rem;color:var(--bg);flex-shrink:0;
}
header h1{font-size:1rem;font-weight:700;flex:1}
.status-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:var(--t3);transition:background .3s;
}
.status-dot.on{background:var(--ok);box-shadow:0 0 8px color-mix(in srgb,var(--ok) 50%,transparent)}
.status-dot.busy{background:var(--ac);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

main{padding:12px;max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:12px}

.panel{
  background:var(--s1);border:1px solid var(--br);
  border-radius:var(--r);overflow:hidden;
}
.panel-hd{
  padding:10px 14px;border-bottom:1px solid var(--br);
  font-size:0.72rem;font-weight:600;text-transform:uppercase;
  letter-spacing:0.04em;color:var(--t2);background:var(--s2);
  display:flex;align-items:center;gap:8px;
}
.panel-bd{padding:12px;display:flex;flex-direction:column;gap:10px}

input,textarea,select,button{font-family:inherit;font-size:0.85rem;border-radius:var(--rs)}
input[type="text"],input[type="url"],input[type="password"],textarea{
  width:100%;padding:9px 12px;background:var(--s3);
  border:1px solid var(--br);color:var(--t1);
}
input:focus,textarea:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px var(--ag)}
textarea{min-height:90px;font-family:'SF Mono','Fira Code',monospace;font-size:0.78rem}
label{font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--t3);display:block;margin-bottom:3px}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;font-weight:600;font-size:0.78rem;
  letter-spacing:0.02em;border:none;cursor:pointer;
  border-radius:var(--rs);transition:all .2s;white-space:nowrap;
  user-select:none;-webkit-user-select:none;
}
.btn:active{transform:scale(0.97)}
.btn-p{background:var(--ac);color:var(--bg);box-shadow:0 2px 10px var(--ag)}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--br)}
.btn-g:hover{background:var(--s3);color:var(--t1)}
.btn-sm{padding:5px 10px;font-size:0.7rem}
.btn:disabled{opacity:0.35;pointer-events:none}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}

.drop-zone{
  border:2px dashed var(--br);border-radius:var(--r);
  padding:20px;text-align:center;cursor:pointer;
  background:var(--s2);transition:all .2s;
}
.drop-zone:active,.drop-zone.drag{border-color:var(--ac);background:color-mix(in srgb,var(--ac) 8%,var(--s2))}
.drop-zone input[type="file"]{display:none}
.dz-icon{font-size:2rem;margin-bottom:4px;opacity:0.5}
.dz-text{font-size:0.82rem;color:var(--t2)}
.dz-hint{font-size:0.68rem;color:var(--t3);margin-top:2px}

.chat-log{max-height:40vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:88%;padding:8px 12px;border-radius:var(--r);font-size:0.8rem;line-height:1.5;animation:fadeUp .3s}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.user{align-self:flex-end;background:var(--ac);color:var(--bg);border-bottom-right-radius:3px}
.chat-msg.assistant{align-self:flex-start;background:var(--s2);border:1px solid var(--br);border-bottom-left-radius:3px}
.chat-msg.system{align-self:center;background:transparent;color:var(--t3);font-size:0.68rem;text-align:center}
.chat-row{display:flex;gap:8px}
.chat-row input{flex:1}

.file-tree{font-family:'SF Mono','Fira Code',monospace;font-size:0.72rem;line-height:1.7;list-style:none;max-height:250px;overflow-y:auto}
.file-tree li{padding:1px 6px;border-radius:3px;cursor:pointer;display:flex;align-items:center;gap:5px}
.file-tree li:hover{background:var(--s3)}
.file-tree li.sel{background:var(--ag);color:var(--ac)}
.file-tree .fi{font-size:0.8rem;width:16px;text-align:center;flex-shrink:0}
.file-tree .fd{color:var(--ac)}
.file-tree .ff{color:var(--t2)}
.file-tree .fs{font-size:0.62rem;color:var(--t3);margin-left:auto}

.result{font-size:0.76rem;padding:10px 12px;border-radius:var(--rs);background:var(--s2);border:1px solid var(--br)}
.result.ok{border-color:var(--ok)}
.result.err{border-color:var(--er);color:var(--er)}

details summary{font-size:0.7rem;color:var(--t3);cursor:pointer;padding:4px 0}
hr{border:none;border-top:1px solid var(--br);margin:4px 0}

.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--t3);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast-ctr{position:fixed;bottom:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{
  background:var(--s2);border:1px solid var(--br);padding:10px 16px;
  border-radius:var(--r);font-size:0.76rem;box-shadow:0 6px 24px rgba(0,0,0,.5);
  animation:slideIn .3s cubic-bezier(0.34,1.56,0.64,1);pointer-events:auto;max-width:280px
}
.toast.ok{border-color:var(--ok)}.toast.err{border-color:var(--er)}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>

<div class="toast-ctr" id="toasts"></div>

<header>
  <div class="logo">APK</div>
  <h1>APK AI Studio</h1>
  <div class="status-dot" id="dot" title="API 状态"></div>
</header>

<main>
  <!-- API 连接 -->
  <div class="panel" id="pnlApi">
    <div class="panel-hd">🔌 AI 模型连接</div>
    <div class="panel-bd">
      <div>
        <label>llama.cpp Server 地址</label>
        <div style="display:flex;gap:6px">
          <input type="text" id="apiUrl" placeholder="http://192.168.1.x:8080/v1" value="" style="flex:1">
          <button class="btn btn-p btn-sm" onclick="connectAPI()" id="btnConnect">连接</button>
        </div>
        <div style="font-size:0.65rem;color:var(--t3);margin-top:4px">
          电脑端运行 <code>llama-server -m model.gguf --host 0.0.0.0</code>，手机连同一 Wi-Fi 填入电脑 IP
        </div>
      </div>
      <div id="apiStatus" style="font-size:0.72rem;color:var(--t3)"></div>
    </div>
  </div>

  <!-- APK 文件 -->
  <div class="panel" id="pnlApk">
    <div class="panel-hd">📱 APK 文件</div>
    <div class="panel-bd">
      <div class="drop-zone" id="dropApk">
        <div class="dz-icon">📦</div>
        <div class="dz-text" id="apkText">点击或拖入 .apk 文件</div>
        <div class="dz-hint" id="apkHint"></div>
        <input type="file" id="apkInput" accept=".apk,.xapk,.apks,.zip">
      </div>
      <div id="apkInfo" style="font-size:0.7rem;color:var(--t3)"></div>
    </div>
  </div>

  <!-- AI 对话 -->
  <div class="panel" id="pnlChat">
    <div class="panel-hd">💬 AI 对话</div>
    <div class="panel-bd">
      <div class="chat-log" id="chatLog">
        <div class="chat-msg system">连接 API 后可对话，AI 将辅助分析/修改 APK</div>
      </div>
      <div class="chat-row">
        <input type="text" id="chatInput" placeholder="输入消息..." disabled>
        <button class="btn btn-p btn-sm" id="chatSend" disabled onclick="send()">发送</button>
      </div>
    </div>
  </div>

  <!-- APK 内容 -->
  <div class="panel" id="pnlFiles">
    <div class="panel-hd">📂 APK 内容 — <span id="fileCount" style="font-weight:400;text-transform:none">未加载</span></div>
    <div class="panel-bd">
      <ul class="file-tree" id="fileTree"><li style="color:var(--t3);padding:8px">加载 APK 后显示文件结构</li></ul>
    </div>
  </div>

  <!-- 文件编辑器 -->
  <div class="panel" id="pnlEdit" style="display:none">
    <div class="panel-hd">✏️ <span id="editName"></span> <span style="margin-left:auto;font-weight:400;text-transform:none;font-size:0.68rem" id="editSize"></span></div>
    <div class="panel-bd">
      <textarea id="editor" placeholder="选择文件进行编辑..."></textarea>
      <div class="btn-row">
        <button class="btn btn-p btn-sm" onclick="saveEdit()">保存修改</button>
        <button class="btn btn-g btn-sm" onclick="closeEdit()">关闭</button>
      </div>
    </div>
  </div>

  <!-- GitHub & 导出 -->
  <div class="panel">
    <div class="panel-hd">🚀 导出 & GitHub</div>
    <div class="panel-bd">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><label>仓库</label><input type="text" id="ghRepo" placeholder="username/repo"></div>
        <div><label>分支</label><input type="text" id="ghBranch" value="main"></div>
      </div>
      <div><label>Token</label><input type="password" id="ghToken" placeholder="ghp_xxx..."></div>
      <div><label>目标路径</label><input type="text" id="ghPath" value="builds/modified.apk"></div>
      <div class="btn-row">
        <button class="btn btn-p btn-sm" id="btnGH" disabled onclick="uploadGH()">上传到 GitHub</button>
        <button class="btn btn-g btn-sm" id="btnDL" disabled onclick="downloadApk()">下载修改后的 APK</button>
      </div>
      <div id="ghResult"></div>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ==================== 状态 ====================
const S={
  apiBase:'',apiConnected:false,
  apkZip:null,apkFiles:[],apkMod:{},apkDel:new Set(),
  selFile:null,modBlob:null,
};

const $=id=>document.getElementById(id);
const D={
  dot:$('dot'),apiUrl:$('apiUrl'),apiStatus:$('apiStatus'),btnConnect:$('btnConnect'),
  dropApk:$('dropApk'),apkInput:$('apkInput'),apkText:$('apkText'),apkHint:$('apkHint'),apkInfo:$('apkInfo'),
  chatLog:$('chatLog'),chatInput:$('chatInput'),chatSend:$('chatSend'),
  fileCount:$('fileCount'),fileTree:$('fileTree'),
  pnlEdit:$('pnlEdit'),editName:$('editName'),editSize:$('editSize'),editor:$('editor'),
  ghRepo:$('ghRepo'),ghBranch:$('ghBranch'),ghToken:$('ghToken'),ghPath:$('ghPath'),
  btnGH:$('btnGH'),btnDL:$('btnDL'),ghResult:$('ghResult'),
  toasts:$('toasts'),
};

// ==================== Toast ====================
function toast(m,t){const e=document.createElement('div');e.className='toast'+(t?' '+t:'');e.textContent=m;D.toasts.appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(()=>e.remove(),300)},2800)}

// ==================== API 连接 ====================
async function connectAPI(){
  const url=D.apiUrl.value.trim();
  if(!url){toast('请输入 API 地址','err');return}
  D.btnConnect.disabled=true;D.btnConnect.textContent='连接中...';
  D.dot.className='status-dot busy';
  try{
    const r=await fetch(url.replace(/\/+$/,'')+'/models',{signal:AbortSignal.timeout(5000)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    S.apiBase=url.replace(/\/+$/,'');
    S.apiConnected=true;
    D.dot.className='status-dot on';
    D.apiStatus.innerHTML='<span style="color:var(--ok)">已连接</span> — '+((d.data||[]).map(m=>m.id).join(', ')||'模型就绪');
    D.chatInput.disabled=false;D.chatSend.disabled=false;
    D.btnConnect.textContent='已连接';D.btnConnect.className='btn btn-g btn-sm';
    toast('API 连接成功','ok');
  }catch(e){
    D.dot.className='status-dot';
    D.btnConnect.disabled=false;D.btnConnect.textContent='连接';
    D.apiStatus.innerHTML='<span style="color:var(--er)">连接失败</span>: '+e.message;
    toast('连接失败: '+e.message,'err');
  }
}
window.connectAPI=connectAPI;

// ==================== APK 处理 ====================
async function loadAPK(file){
  try{
    const buf=await file.arrayBuffer();
    const zip=await JSZip.loadAsync(buf);
    S.apkZip=zip;S.apkFiles=[];S.apkMod={};S.apkDel=new Set();S.selFile=null;S.modBlob=null;

    const ps=[];
    zip.forEach((p,f)=>{
      ps.push((async()=>{
        let d=null,sz=f._data?.uncompressedSize||0;
        if(!f.dir){d=await f.async('uint8array');sz=d.length}
        S.apkFiles.push({name:p,dir:f.dir,size:sz,data:d});
      })());
    });
    await Promise.all(ps);
    S.apkFiles.sort((a,b)=>a.dir!==b.dir?(a.dir?-1:1):a.name.localeCompare(b.name));

    D.apkText.textContent=file.name;
    D.apkHint.textContent=(file.size/1024/1024).toFixed(1)+' MB · '+S.apkFiles.length+' 项';
    D.apkInfo.textContent='已加载: '+S.apkFiles.filter(f=>!f.dir).length+' 文件, '+S.apkFiles.filter(f=>f.dir).length+' 目录';
    D.fileCount.textContent=S.apkFiles.filter(f=>!f.dir).length+' 文件';
    D.btnGH.disabled=true;D.btnDL.disabled=true;
    renderTree();
    toast('APK 加载成功','ok');
  }catch(e){toast('加载失败: '+e.message,'err')}
}

function renderTree(){
  let h='';
  for(const f of S.apkFiles){
    const d=f.name.split('/').length-1;
    const dn=f.name.split('/').pop()||f.name;
    const sel=S.selFile&&S.selFile.name===f.name;
    const ic=f.dir?'📁':'📄';
    const cl=f.dir?'fd':'ff';
    const mod=S.apkMod[f.name]?' ✏️':'';
    const del=S.apkDel.has(f.name)?' 🗑':'';
    const sz=f.dir?'':fmtSize(f.size);
    h+=`<li class="${sel?'sel':''}" style="padding-left:${8+d*14}px" onclick="sel('${esc(f.name)}')"><span class="fi ${cl}">${ic}</span>${dn}${mod}${del}${sz?`<span class="fs">${sz}</span>`:''}</li>`;
  }
  D.fileTree.innerHTML=h?'<ul class="file-tree" style="list-style:none;margin:0;padding:0">'+h+'</ul>':'<li style="color:var(--t3);padding:8px">空</li>';
}
function fmtSize(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(2)+' MB'}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ==================== 文件选择 & 编辑 ====================
window.sel=function(name){
  const f=S.apkFiles.find(x=>x.name===name);
  if(!f||f.dir)return;
  S.selFile=f;
  D.pnlEdit.style.display='';
  D.editName.textContent=f.name;
  D.editSize.textContent=fmtSize(f.size);
  const raw=S.apkMod[f.name]||f.data;
  if(!raw){D.editor.value='[无法读取]';renderTree();return}
  const ext=f.name.split('.').pop()?.toLowerCase();
  const txt=new Set(['xml','txt','json','yml','yaml','properties','mf','sf','pro','smali','java','kt','gradle','cfg','ini','conf','csv','md','html','css','js']);
  if(txt.has(ext)||f.name==='AndroidManifest.xml'||f.name.includes('META-INF')||f.name.includes('res/')){
    try{D.editor.value=new TextDecoder('utf-8').decode(raw)}catch(e){D.editor.value='[解码失败]'}
  }else if(['png','jpg','jpeg','gif','webp'].includes(ext)){
    D.editor.value='[图片 - 暂不支持预览编辑]';
  }else{
    D.editor.value='[二进制文件]';
  }
  renderTree();
  D.pnlEdit.scrollIntoView({behavior:'smooth'});
};
window.saveEdit=function(){
  if(!S.selFile)return;
  S.apkMod[S.selFile.name]=new TextEncoder().encode(D.editor.value);
  S.apkDel.delete(S.selFile.name);
  rebuild();
  toast('已保存: '+S.selFile.name,'ok');
  renderTree();
};
window.closeEdit=function(){D.pnlEdit.style.display='none';S.selFile=null;renderTree()};

async function rebuild(){
  if(!S.apkZip)return;
  const nz=new JSZip();
  for(const f of S.apkFiles){
    if(S.apkDel.has(f.name))continue;
    if(S.apkMod[f.name])nz.file(f.name,S.apkMod[f.name]);
    else if(!f.dir&&f.data)nz.file(f.name,f.data);
    else if(f.dir)nz.folder(f.name);
  }
  S.modBlob=await nz.generateAsync({type:'blob',compression:'DEFLATE'});
  D.btnDL.disabled=false;D.btnGH.disabled=false;
}

window.downloadApk=function(){
  if(!S.modBlob){toast('请先修改 APK','err');return}
  const u=URL.createObjectURL(S.modBlob);
  const a=document.createElement('a');a.href=u;a.download='modified.apk';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(u);
  toast('下载开始（未签名 APK）','ok');
};

// ==================== AI 对话 ====================
window.send=async function(){
  const txt=D.chatInput.value.trim();
  if(!txt)return;
  D.chatInput.value='';D.chatInput.disabled=true;D.chatSend.disabled=true;
  addMsg(txt,'user');

  let ctx='';
  if(S.apkZip){
    const fl=S.apkFiles.filter(f=>!f.dir).slice(0,30).map(f=>f.name).join(', ');
    ctx='\n当前 APK 文件列表: '+fl;
  }

  try{
    const msgs=[
      {role:'system',content:'你是 APK 修改专家。简明扼要回答。'+ctx},
      {role:'user',content:txt}
    ];
    const r=await fetch(S.apiBase+'/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:msgs,temperature:0.7,max_tokens:512}),
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    addMsg(d.choices?.[0]?.message?.content||'[空回复]','assistant');
  }catch(e){
    addMsg('错误: '+e.message,'assistant');
  }
  D.chatInput.disabled=false;D.chatSend.disabled=false;D.chatInput.focus();
};

function addMsg(t,r){
  const d=document.createElement('div');
  d.className='chat-msg '+r;d.textContent=t;
  D.chatLog.appendChild(d);
  D.chatLog.scrollTop=D.chatLog.scrollHeight;
}

// ==================== GitHub 上传 ====================
window.uploadGH=async function(){
  const repo=D.ghRepo.value.trim(),token=D.ghToken.value.trim();
  const path=D.ghPath.value.trim(),branch=D.ghBranch.value.trim()||'main';
  if(!repo||!token||!path){toast('请填写仓库/Token/路径','err');return}
  if(!S.modBlob){toast('请先修改 APK','err');return}
  D.btnGH.disabled=true;D.btnGH.textContent='上传中...';
  try{
    const buf=await S.modBlob.arrayBuffer();
    const b64=btoa(String.fromCharCode(...new Uint8Array(buf)));

    let sha=null;
    try{
      const gr=await fetch(`https://api.github.com/repos/${repo}/contents/${path}?ref=${branch}`,{headers:{Authorization:`token ${token}`}});
      if(gr.ok){const gd=await gr.json();sha=gd.sha}
    }catch(e){}

    const body={message:`Update ${path}`,content:b64,branch};
    if(sha)body.sha=sha;
    const r=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      method:'PUT',headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify(body),
    });
    const d=await r.json();
    if(r.ok){
      D.ghResult.innerHTML=`<div class="result ok">上传成功！<br><a href="${d.content?.html_url||`https://github.com/${repo}/blob/${branch}/${path}`}" target="_blank" style="color:var(--ac)">查看 →</a></div>`;
      toast('上传成功','ok');
    }else{
      D.ghResult.innerHTML=`<div class="result err">${d.message||'HTTP '+r.status}</div>`;
      toast('失败: '+(d.message||''),'err');
    }
  }catch(e){D.ghResult.innerHTML=`<div class="result err">${e.message}</div>`;toast('网络错误','err')}
  D.btnGH.disabled=false;D.btnGH.textContent='上传到 GitHub';
};

// ==================== 拖放绑定 ====================
(function(){
  function dz(el,inp,fn){
    el.addEventListener('click',()=>inp.click());
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag')});
    el.addEventListener('dragleave',()=>el.classList.remove('drag'));
    el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)fn(f)});
    inp.addEventListener('change',e=>{const f=e.target.files[0];if(f)fn(f);inp.value=''});
  }
  dz(D.dropApk,D.apkInput,f=>{
    const ext=f.name.split('.').pop()?.toLowerCase();
    if(!['apk','xapk','apks','zip'].includes(ext)){toast('请选择 .apk 文件','err');return}
    loadAPK(f);
  });
  D.chatInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!D.chatSend.disabled)send()}});
})();
</script>
</body>
</html>
